name: frontend
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  # --- WARNING ---
  # Run 'flutter pub outdated' and set ^versions before production release

  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State
  flutter_riverpod:
  riverpod_annotation:

  # Network & Auth
  connectivity_plus:
  dio:
  retrofit:
  dio_cookie_manager:
  cookie_jar:

  # Storage
  drift:
  flutter_secure_storage:
  shared_preferences:
  sqlite3_flutter_libs:
  path:
  path_provider:

  # Crypto
  bip39:
  cryptography:

  # Models
  freezed_annotation:
  json_annotation:

  # UI
  flutter_quill: ^11.5.0
  flutter_quill_extensions: ^11.0.0
  slang_flutter:
  cupertino_icons:
  google_fonts: ^6.2.1
  flex_color_scheme: ^8.0.1

  # Navigation
  go_router:

  # Testing
  mocktail:

  # Utils
  uuid:
  unorm_dart:
  fpdart:
  logger:

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Builders
  build_runner:
  riverpod_generator:
  retrofit_generator:
  drift_dev:
  freezed:
  json_serializable:
  go_router_builder:

  # Linting
  custom_lint:
  riverpod_lint:
  very_good_analysis:

flutter:
  assets:
    - assets/images/

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
